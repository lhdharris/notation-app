<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:; font-src 'self' data:">
  <title>Notation</title>
  <link rel="icon" href="notation-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="no-hover">
  <div id="app">
    <!-- Frameless top bar (drag region). Buttons + tabs opt out via no-drag. -->
    <div id="toolbar">
      <button id="sidebar-toggle" title="Toggle side panel">
        <svg width="19" height="19" viewBox="0 0 16 16" aria-hidden="true">
          <rect x="1.5" y="2.5" width="13" height="11" rx="1.5" fill="none"
                stroke="currentColor" stroke-width="1.4"/>
          <line x1="6" y1="2.5" x2="6" y2="13.5" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>

      <!-- Open files as tabs. Reorderable + detachable (see app.js). The bar's
           empty space stays a window drag region; individual tabs are no-drag.
           The non-scrolling wrapper carries the blue "portal" overflow lines
           (its ::before/::after) shown when tabs run off either edge (#4). -->
      <div id="tab-bar-wrap">
        <div id="tab-bar"></div>
      </div>

      <!-- Share / export menu (box with an arrow leaving the top). Sits just
           left of the window controls; click opens a dropdown with "Export to
           PDF…". -->
      <button id="share-btn" title="Share">
        <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M3 7.5 V13 a1 1 0 0 0 1 1 H12 a1 1 0 0 0 1 -1 V7.5"
                fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 9.5 V2 M5 4.6 L8 1.6 L11 4.6"
                fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div id="wm-buttons">
        <!-- "Stickify": shrink the window into a desktop post-it that is a live
             editor of the current file. Folded-corner icon. -->
        <button id="sticky" title="Stickify (shrink to a desktop note)">
          <svg width="13" height="13" viewBox="0 0 11 11" aria-hidden="true">
            <path d="M1 1 H7 L10 4 V10 H1 Z" stroke="currentColor" stroke-width="1.3"
                  fill="none" stroke-linejoin="round"/>
            <path d="M7 1 V4 H10" stroke="currentColor" stroke-width="1.3"
                  fill="none" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="maximize" title="Maximize">
          <svg width="12" height="12" viewBox="0 0 10 10" aria-hidden="true">
            <rect x="1" y="1" width="8" height="8" stroke="currentColor" stroke-width="1.5"
                  fill="none" rx="1"/>
          </svg>
        </button>
        <button id="close" title="Close">
          <svg width="12" height="12" viewBox="0 0 10 10" aria-hidden="true">
            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round"/>
            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="body">
      <!-- Collapsible side panel: linked workspace folders + their trees. -->
      <aside id="sidebar">
        <div id="sidebar-head">
          <span>Workspaces</span>
          <div id="sidebar-head-actions">
            <button id="new-file" title="New markdown file in the current folder">
              <svg width="19" height="19" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M2.8 2.8h6.3l4.0 4.0v6.6c0 .5-.4.9-.9.9H3.7c-.5 0-.9-.4-.9-.9V3.7c0-.5.4-.9.9-.9z"
                      fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M9.1 2.9V6.8h4.0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <line x1="7.95" y1="8.1" x2="7.95" y2="11.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="6.05" y1="10.0" x2="9.85" y2="10.0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
            <button id="add-workspace" title="Add workspace">
              <svg width="19" height="19" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M1.4 3.9c0-.66.55-1.2 1.2-1.2h3.1l1.3 1.5h6.4c.66 0 1.2.55 1.2 1.2v6.9c0 .66-.55 1.2-1.2 1.2H2.6c-.66 0-1.2-.55-1.2-1.2V3.9z"
                      fill="none" stroke="currentColor" stroke-width="1.4"/>
                <line x1="8" y1="6.9" x2="8" y2="10.7" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
                <line x1="6.1" y1="8.8" x2="9.9" y2="8.8" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="tree"></div>
        <div id="sidebar-hint">Right-click here to add a workspace folder.</div>
      </aside>

      <!-- Editor: a single live-preview surface (the cursor's line stays raw
           markdown; every other line renders). Mounted by live-editor.js. -->
      <main id="main">
        <!-- Minimalist formatting bar (word-editor basics). Acts on the live
             editor via its public API (app.js wires the clicks). Persistent in
             normal windows; hidden only in sticky mode. -->
        <div id="format-bar">
          <button data-action="bold" title="Bold"><span class="fmt-glyph fmt-bold">B</span></button>
          <button data-action="italic" title="Italic"><span class="fmt-glyph fmt-italic">I</span></button>
          <button data-action="strike" title="Strikethrough"><span class="fmt-glyph fmt-strike">S</span></button>
          <button data-action="code" title="Inline code">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M5.5 4.5 L2 8 L5.5 11.5 M10.5 4.5 L14 8 L10.5 11.5" fill="none"
                    stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button data-action="link" title="Link">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M6.4 9.6 L9.6 6.4 M7.2 4.8 L8.8 3.2 a2.55 2.55 0 0 1 3.6 3.6 L10.8 8.4 M8.8 11.2 L7.2 12.8 a2.55 2.55 0 0 1 -3.6 -3.6 L5.2 7.6"
                    fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="fmt-sep"></span>
          <button data-action="h1" title="Heading 1"><span class="fmt-glyph fmt-h">H1</span></button>
          <button data-action="h2" title="Heading 2"><span class="fmt-glyph fmt-h">H2</span></button>
          <button data-action="h3" title="Heading 3"><span class="fmt-glyph fmt-h">H3</span></button>
          <span class="fmt-sep"></span>
          <button data-action="ul" title="Bullet list">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="3" cy="4" r="1.15" fill="currentColor"/>
              <circle cx="3" cy="8" r="1.15" fill="currentColor"/>
              <circle cx="3" cy="12" r="1.15" fill="currentColor"/>
              <path d="M6.2 4 H14 M6.2 8 H14 M6.2 12 H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <button data-action="ol" title="Numbered list">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <text x="1.2" y="6" font-size="6.4" fill="currentColor" stroke="none" font-family="inherit">1</text>
              <text x="1.2" y="14" font-size="6.4" fill="currentColor" stroke="none" font-family="inherit">2</text>
              <path d="M6.6 4 H14 M6.6 12 H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <button data-action="task" title="Task list">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <rect x="1.6" y="3.6" width="7" height="7" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.3"/>
              <path d="M3.8 7.2 L5.2 8.6 L7.6 5.6" fill="none" stroke="currentColor" stroke-width="1.3"
                    stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10.6 7 H14.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <button data-action="quote" title="Quote">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 3 V13 M6.2 5 H13.6 M6.2 8 H13.6 M6.2 11 H11"
                    fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="fmt-sep"></span>
          <button data-action="table" title="Insert table">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <rect x="1.8" y="2.5" width="12.4" height="11" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.3"/>
              <path d="M1.8 6.4 H14.2 M8 6.4 V13.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
            </svg>
          </button>
          <button data-action="codeblock" title="Code block">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <rect x="1.8" y="2.5" width="12.4" height="11" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.3"/>
              <path d="M6.4 6 L4.4 8 L6.4 10 M9.6 6 L11.6 8 L9.6 10" fill="none"
                    stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button data-action="hr" title="Horizontal rule">
            <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M2 8 H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div id="live" hidden></div>

        <div id="empty-state" class="centered">
          <div class="empty-inner">
            <svg width="66" height="66" viewBox="0 0 64 64" aria-hidden="true" class="empty-icon">
              <path d="M16 10 a3 3 0 0 1 3-3 h20 l9 9 v35 a3 3 0 0 1-3 3 H19 a3 3 0 0 1-3-3 Z"
                    fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
              <path d="M39 7 v6 a3 3 0 0 0 3 3 h6" fill="none" stroke="currentColor"
                    stroke-width="2.4" stroke-linejoin="round"/>
              <line x1="23" y1="28" x2="41" y2="28" stroke="currentColor" stroke-width="2.4"
                    stroke-linecap="round" opacity="0.55"/>
              <line x1="23" y1="36" x2="41" y2="36" stroke="currentColor" stroke-width="2.4"
                    stroke-linecap="round" opacity="0.4"/>
              <line x1="23" y1="44" x2="34" y2="44" stroke="currentColor" stroke-width="2.4"
                    stroke-linecap="round" opacity="0.4"/>
            </svg>
            <div class="empty-title">No file open</div>
            <div class="empty-sub">Add a workspace, then pick a file from the side panel.</div>
          </div>
        </div>
      </main>
    </div>

    <!-- Sticky-note chrome. Shown via body.sticky-mode while the OS window is
         shrunk to a post-it; the live editor (#live) shows through, compacted.
         The title strip is the drag handle; hover reveals the action buttons. -->
    <div id="sticky-title"></div>
    <div id="sticky-actions">
      <button class="sticky-action-btn" id="sticky-color" title="Note colour">
        <span class="sticky-swatch"></span>
      </button>
      <button class="sticky-action-btn" id="sticky-restore" title="Restore">
        <svg width="11" height="11" viewBox="0 0 10 10" aria-hidden="true">
          <rect x="1" y="1" width="8" height="8" stroke="currentColor" stroke-width="1.5"
                fill="none" rx="1"/>
        </svg>
      </button>
      <button class="sticky-action-btn" id="sticky-x" title="Close">
        <svg width="11" height="11" viewBox="0 0 10 10" aria-hidden="true">
          <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round"/>
          <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Sticky-note resize grip (bottom-right). Frameless Wayland windows have no
         compositor resize edges, so we drive resizing from a grip via relative
         pointer deltas (see app.js). Shown only in sticky-mode. -->
    <div id="sticky-resize" title="Drag to resize">
      <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
        <path d="M11 4 L4 11 M11 8 L8 11" stroke="currentColor" stroke-width="1.3"
              stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Drop indicator shown while a tab from another window is dragged over us. -->
    <div id="tab-drop-hint" hidden></div>

    <!-- Custom right-click menu (Electron has no default; we need rich items). -->
    <div id="context-menu" hidden></div>
  </div>

  <!-- Gantt support: mermaid-free parser + palette (ported from res/projector-app)
       and a custom SVG renderer, loaded before markdown.js so a ```mermaid gantt
       block renders as a chart in the preview. All local 'self' scripts (no eval). -->
  <!-- Vendored KaTeX (CSP script-src 'self'): math rendering for $...$ / $$...$$. -->
  <script src="vendor/katex/katex.min.js"></script>
  <script src="gantt-parse.js"></script>
  <script src="palette.js"></script>
  <script src="gantt-render.js"></script>
  <script src="markdown.js"></script>
  <script src="live-editor.js"></script>
  <script src="pdf-export.js"></script>
  <script src="app.js"></script>
</body>
</html>
